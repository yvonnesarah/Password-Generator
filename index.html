<!DOCTYPE html>
<html lang="en-gb">
<head>
  <!-- Character encoding for proper text display -->
  <meta charset="UTF-8" />

  <!-- Makes the layout responsive on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Page title shown in the browser tab -->
  <title>Password Generator</title>

  <!-- Link to external CSS stylesheet -->
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
  <!-- Main wrapper for the whole app -->
  <div class="wrapper">

    <!-- Header section with title and theme toggle button -->
    <header>
      <h1>Password Generator</h1>

      <!-- Button to switch between light/dark mode -->
      <button id="theme-toggle">🌙</button>
    </header>

    <!-- Main card container -->
    <div class="card">

      <!-- Card header -->
      <div class="card-header">
        <h2>Generate a Password</h2>
      </div>

      <!-- Card body containing generator controls -->
      <div class="card-body">

        <!-- Text area where generated password will appear -->
        <textarea readonly id="password"></textarea>

        <!-- Password strength indicator -->
        <div class="strength-container">
          <!-- Visual strength bar -->
          <div id="strength-bar"></div>

          <!-- Text description of strength -->
          <p id="strength-text">Strength: -</p>
        </div>

        <!-- Controls for password options -->
        <div class="controls">

          <!-- Slider to choose password length -->
          <label>
            Password Length: <span id="length-value">12</span>
          </label>
          <input type="range" id="length" min="10" max="64" value="12"/>

          <!-- Checkbox options for character types -->
          <label>
            <input type="checkbox" id="lower" checked> Lowercase
          </label>

          <label>
            <input type="checkbox" id="upper" checked> Uppercase
          </label>

          <label>
            <input type="checkbox" id="numbers" checked> Numbers
          </label>

          <label>
            <input type="checkbox" id="symbols" checked> Symbols
          </label>
        </div>
      </div>

      <!-- Footer with action buttons -->
      <div class="card-footer">

        <!-- Button to generate a new password -->
        <button id="generate" class="btn">Generate Password</button>

        <!-- Button to copy password to clipboard -->
        <button id="copy" class="btn">Copy Password</button>
      </div>

      <!-- Password history section -->
      <div class="history">
        <h3>History</h3>

        <!-- List where previous passwords will be stored -->
        <ul id="history-list"></ul>
        <button id="clear-history" class="btn">Clear History</button>
      </div>
    </div>
  </div>

  <!-- Link to JavaScript file for functionality -->
  <script src="./assets/js/script.js"></script>
</body>
</html>
