<!DOCTYPE html>
<html lang="en-gb">
<head>
  <!-- Character encoding for proper text display -->
  <meta charset="UTF-8" />

  <!-- Ensure responsive design on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Page title displayed in browser tab -->
  <title>Password Generator</title>

  <!-- Link to external CSS stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="light">
  <!-- Main wrapper for entire app -->
  <div class="wrapper">

    <!-- =========================
         HEADER SECTION
    ========================= -->
    <header>
      <!-- App title -->
      <h1>Password Generator</h1>

     <!-- Theme selection with title/label -->
    <div class="theme-selector-wrapper">
    <label for="theme-selector">Choose a Theme:</label>
    <select id="theme-selector">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="cyberpunk">Cyberpunk</option>
      <option value="aurora">Aurora</option>
      <option value="synthwave">Synthwave</option>
      <option value="comic-book">Comic Book</option>
    </select>
    </div>
    </header>

    <!-- =========================
         PASSWORD CARD
    ========================= -->
    <div class="card">

      <!-- Card header -->
      <div class="card-header">
        <h2>Generate a Password</h2>
      </div>

      <!-- Card body containing password display & controls -->
      <div class="card-body">

        <!-- Password output field -->
        <textarea readonly id="password"></textarea>

        <!-- Password strength meter -->
        <div class="strength-container">
          <!-- Visual strength bar -->
          <div id="strength-bar"></div>
          <!-- Text label showing strength -->
          <p id="strength-text">Strength: -</p>
        </div>

        <!-- Password options and settings -->
        <div class="controls">
          <!-- Slider for password length -->
          <label>Password Length: <span id="length-value">12</span></label>
          <input type="range" id="length" min="10" max="64" value="12"/>

          <!-- Character type checkboxes -->
          <label><input type="checkbox" id="lower" checked> Lowercase</label>
          <label><input type="checkbox" id="upper" checked> Uppercase</label>
          <label><input type="checkbox" id="numbers" checked> Numbers</label>
          <label><input type="checkbox" id="symbols" checked> Symbols</label>
        </div>
      </div>

      <!-- Card footer with action buttons -->
      <div class="card-footer">
        <!-- Generate new password -->
        <button id="generate" class="btn">Generate Password</button>
        <!-- Copy password to clipboard -->
        <button id="copy" class="btn">Copy Password</button>
        <!-- Export password history -->
        <button id="export" class="btn">Export History</button>
      </div>

      <!-- =========================
           PASSWORD HISTORY SECTION
      ========================= -->
      <div class="history">
        <h3>Password History</h3>

        <!-- Search/filter history -->
        <input type="text" id="history-search" placeholder="Search history..." />

        <!-- List of previously generated passwords -->
        <ul id="history-list"></ul>

        <!-- Clear all history button -->
        <button id="clear-history" class="btn">Clear History</button>
      </div>
    </div>

    <!-- Toast notification for copy success -->
    <div id="toast">Copied!</div>
  </div>

  <!-- Link to main JavaScript file -->
  <script src="assets/js/script.js"></script>
</body>
</html>
